name: investment-helper-devcontainer

services:
  dev:
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile
    user: node
    command: sh -lc "mkdir -p /workspaces/workspace/project/node_modules; if [ \"$(id -u)\" = \"0\" ]; then chown -R node:node /workspaces/workspace/project/node_modules; elif command -v sudo >/dev/null 2>&1; then sudo chown -R node:node /workspaces/workspace/project/node_modules; else echo '[devcontainer] Unable to chown node_modules (non-root, no sudo).'; fi; sleep infinity"
    volumes:
      - ..:/workspaces/workspace:cached
      - dev_node_modules:/workspaces/workspace/project/node_modules
    environment:
      OPENCODE_CONFIG_DIR: /workspaces/workspace/.opencode
      OPENCODE_CONFIG: /workspaces/workspace/opencode.json
      DATABASE_URL: postgresql://dev:dev@db:5432/investment_helper
      REDIS_URL: redis://redis:6379
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      OPENDART_API_KEY: ${OPENDART_API_KEY:-}
      SUPABASE_URL: ${SUPABASE_URL:-}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${VITE_SUPABASE_PUBLISHABLE_KEY:-}
      SUPABASE_SECRET_KEY: ${SUPABASE_SECRET_KEY:-}
      HTTP_PROXY: ${HTTP_PROXY:-}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
      NO_PROXY: ${NO_PROXY:-}
      http_proxy: ${HTTP_PROXY:-}
      https_proxy: ${HTTPS_PROXY:-}
      no_proxy: ${NO_PROXY:-}
    ports:
      - "3000:3000"
      - "8787:8787"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: investment_helper
    ports:
      - "${HOST_POSTGRES_PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev -d investment_helper"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - "${HOST_REDIS_PORT:-6380}:6379"

volumes:
  dev_node_modules:
  pgdata:
