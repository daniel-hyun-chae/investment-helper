name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_PAGES_PROJECT_NAME: ${{ secrets.CLOUDFLARE_PAGES_PROJECT_NAME }}
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_URL: ${{ secrets.SUPABASE_PROJECT_URL }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      PUBLIC_BASE_URL: ${{ secrets.PUBLIC_BASE_URL }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      OPENDART_API_KEY: ${{ secrets.OPENDART_API_KEY }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace
        run: pnpm -r --if-present build

      - name: Link Supabase project
        run: |
          host="${SUPABASE_PROJECT_URL#https://}"
          host="${host#http://}"
          project_ref="${host%%.*}"
          if [ -z "$project_ref" ]; then
            echo "Could not derive project ref from SUPABASE_PROJECT_URL"
            exit 1
          fi
          supabase link --project-ref "$project_ref" --password "$SUPABASE_DB_PASSWORD"

      - name: Apply Supabase migrations
        run: supabase db push

      - name: Deploy bot worker
        run: pnpm -C apps/bot-worker run deploy

      - name: Deploy admin web
        run: |
          pages_project_name="${CLOUDFLARE_PAGES_PROJECT_NAME:-investment-helper-admin}"

          if ! pnpm -C apps/bot-worker exec wrangler pages project create "$pages_project_name" --production-branch main; then
            echo "Pages project create returned non-zero. It may already exist; continuing with deploy."
          fi

          if [ -d "apps/admin-web/.output/public" ]; then
            pnpm -C apps/bot-worker exec wrangler pages deploy ../admin-web/.output/public --project-name "$pages_project_name"
          elif [ -d "apps/admin-web/dist" ]; then
            pnpm -C apps/bot-worker exec wrangler pages deploy ../admin-web/dist --project-name "$pages_project_name"
          else
            echo "No deployable admin output found"
            exit 1
          fi

      - name: Post-deploy health checks
        run: |
          curl -fsSL "$PUBLIC_BASE_URL/health"
          curl -fsSL "$PUBLIC_BASE_URL/admin/health"
